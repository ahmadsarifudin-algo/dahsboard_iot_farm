services:
  # TimescaleDB (PostgreSQL with time-series extension)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: iot-timescaledb
    environment:
      POSTGRES_DB: iot_dashboard
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - iot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user -d iot_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache and pub/sub
  redis:
    image: redis:7-alpine
    container_name: iot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot-backend
    environment:
      # Database & Cache
      DATABASE_URL: postgresql+asyncpg://iot_user:iot_password@timescaledb:5432/iot_dashboard
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      ENVIRONMENT: production
      # CORS — allow frontend container and host-side browser access
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      # Chickin Integration — external upstream services
      CHICKIN_AUTH_BASE_URL: https://auth.chickinindonesia.com
      CHICKIN_IOT_BASE_URL: https://prod-iot.chickinindonesia.com
      # MQTT (optional — enable if backend should subscribe to broker)
      MQTT_ENABLED: "false"
      MQTT_BROKER: broker.chickinindonesia.com
      MQTT_PORT: "1883"
      # JWT — change in production!
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iot-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into Next.js at build time — use host-accessible URL
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
        NEXT_PUBLIC_MQTT_URL: ${NEXT_PUBLIC_MQTT_URL:-ws://broker.chickinindonesia.com:8083/mqtt}
    container_name: iot-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - iot-network
    restart: unless-stopped

volumes:
  timescaledb_data:
  redis_data:

networks:
  iot-network:
    driver: bridge
